<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debugger Pédagogique Polyglot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-800">

    <header class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <span>🚀</span> Debugger Polyglot
            </h1>
            <div class="text-right">
                <p class="text-indigo-100 text-xs uppercase tracking-wider font-semibold">Master 1 DFS</p>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <!-- PANNEAU DE SAISIE -->
        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-4 h-fit sticky top-6">
            <h2 class="text-lg font-semibold text-slate-700 border-b pb-2 flex justify-between items-center">
                Saisie du Bug
                <select id="langage" class="text-xs bg-indigo-50 text-indigo-700 border-none rounded px-2 py-1 outline-none font-bold">
                    <option value="Python">Python</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="PHP">PHP</option>
                    <option value="Java">Java</option>
                    <option value="C++">C++</option>
                    <option value="Autre">Autre</option>
                </select>
            </h2>
            
            <!-- ZONE UNIQUE : CODE + ERREUR -->
            <div class="flex flex-col gap-2">
                <label for="prompt" class="text-sm font-medium text-slate-600">Ton code et l'erreur :</label>
                <textarea id="prompt" rows="12" class="w-full p-4 bg-slate-50 border border-slate-300 rounded-lg font-mono text-sm focus:ring-2 focus:ring-indigo-500 outline-none resize-none" placeholder="Colle ton code ici, suivi du message d'erreur de la console..."></textarea>
            </div>

            <div class="flex gap-2">
                <button id="btn-analyze" class="flex-grow bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg transition-all flex justify-center items-center gap-2 shadow-md disabled:opacity-70 disabled:cursor-not-allowed">
                    <span>Analyser le bug</span>
                    <svg id="spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
                <button id="btn-reset" class="bg-slate-100 hover:bg-slate-200 text-slate-500 p-3 rounded-lg border border-slate-200 transition-colors" title="Réinitialiser">🔄</button>
            </div>
        </section>

        <!-- PANNEAU DE RÉSULTAT -->
        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col min-h-[500px]">
            <h2 class="text-lg font-semibold text-slate-700 border-b pb-2 mb-4 italic">Réponse du Mentor Socratique</h2>
            
            <div id="result-container" class="flex-grow overflow-y-auto hidden flex flex-col gap-6">
                <div class="bg-indigo-50 border-l-4 border-indigo-500 p-4 rounded-r-lg fade-in">
                    <p id="res-explication" class="text-indigo-900 text-sm leading-relaxed"></p>
                </div>

                <div id="res-hypotheses" class="flex flex-col gap-4 fade-in" style="animation-delay: 0.2s;"></div>

                <div id="res-encouragement" class="mt-auto bg-emerald-50 p-4 rounded-lg border border-emerald-200 text-center text-sm text-emerald-800 font-medium italic fade-in" style="animation-delay: 0.4s;"></div>
            </div>

            <div id="empty-state" class="flex-grow flex flex-col items-center justify-center text-slate-400 gap-4 text-center p-8">
                <p class="text-sm">Prêt à analyser tes bugs, peu importe le langage !</p>
                <p id="error-display" class="text-xs text-red-500 font-mono mt-4 hidden"></p>
            </div>
        </section>
    </main>

    <script>
        let conversationHistory = "";

        const btnAnalyze = document.getElementById('btn-analyze');
        const spinner = document.getElementById('spinner');
        const resultContainer = document.getElementById('result-container');
        const emptyState = document.getElementById('empty-state');
        const errorDisplay = document.getElementById('error-display');

        // Réinitialisation de l'interface
        document.getElementById('btn-reset').onclick = () => {
            conversationHistory = "";
            document.getElementById('prompt').value = ""; // Modifié ici
            resultContainer.classList.add('hidden');
            emptyState.classList.remove('hidden');
            errorDisplay.classList.add('hidden');
        };

        btnAnalyze.onclick = async () => {
            const prompt = document.getElementById('prompt').value.trim(); // Modifié ici
            const langage = document.getElementById('langage').value;
            
            if (!prompt) return alert("Veuillez coller votre code et/ou erreur !");

            btnAnalyze.disabled = true;
            spinner.classList.remove('hidden');
            errorDisplay.classList.add('hidden');
            
            // NOUVEAU : On change le texte du bouton pour rassurer l'utilisateur
            const originalBtnText = btnAnalyze.querySelector('span').innerText;
            btnAnalyze.querySelector('span').innerText = "Analyse en cours (patiente un peu)...";

            try {
                // NOUVEAU : Sécurité anti-blocage infini (Timeout de 60 secondes)
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 60000); 

                // Envoi des données adaptées au nouveau backend (prompt au lieu de code/erreur)
                const response = await fetch('http://127.0.0.1:8000/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ langage, prompt, historique: conversationHistory }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);

                const data = await response.json();
                
                if (!response.ok) {
                    // RÉSOLUTION ICI : On force la conversion de l'objet d'erreur en texte
                    let errMsg = data.detail || "Erreur inconnue";
                    if (typeof errMsg === 'object') {
                        errMsg = JSON.stringify(errMsg, null, 2);
                    }
                    throw new Error(errMsg);
                }

                // Mise à jour de l'historique
                conversationHistory += `\nÉtudiant: ${prompt}\nMentor: ${data.explication_erreur}`;

                // Affichage des résultats
                document.getElementById('res-explication').innerText = data.explication_erreur;
                document.getElementById('res-encouragement').innerText = data.encouragement;
                
                const container = document.getElementById('res-hypotheses');
                container.innerHTML = ''; 

                data.hypotheses.forEach((hyp, i) => {
                    container.innerHTML += `
                        <div class="bg-white border border-slate-200 rounded-lg p-4 shadow-sm">
                            <h4 class="font-bold text-slate-800 text-sm mb-1">${i+1}. ${hyp.titre}</h4>
                            <p class="text-slate-600 text-xs mb-3">${hyp.explication}</p>
                            <div class="bg-slate-900 text-indigo-300 text-[10px] p-3 rounded font-mono">
                                <b class="text-white">ACTION :</b> ${hyp.test_suggere}
                            </div>
                        </div>
                    `;
                });

                emptyState.classList.add('hidden');
                resultContainer.classList.remove('hidden');

            } catch (e) {
                console.error(e);
                // NOUVEAU : Gestion propre des erreurs sans alert() intempestif
                let messageErreur = e.message;
                if (e.name === 'AbortError') {
                    messageErreur = "Le serveur met trop de temps à répondre. Mistral est peut-être surchargé, réessaie.";
                }
                errorDisplay.innerText = "❌ Erreur : " + messageErreur;
                errorDisplay.classList.remove('hidden');
                emptyState.classList.remove('hidden'); // On réaffiche la zone vide
                resultContainer.classList.add('hidden'); // On cache les anciens résultats
            } finally {
                btnAnalyze.disabled = false;
                spinner.classList.add('hidden');
                // NOUVEAU : On restaure le texte d'origine du bouton
                btnAnalyze.querySelector('span').innerText = originalBtnText;
            }
        };
    </script>
</body>
</html>
