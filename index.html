<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debugger Pédagogique Polyglot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-800">

    <header class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <span>🚀</span> Debugger Polyglot
            </h1>
            <div class="text-right">
                <p class="text-indigo-100 text-xs uppercase tracking-wider font-semibold">Master 1 DFS</p>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-4 h-fit sticky top-6">
            <h2 class="text-lg font-semibold text-slate-700 border-b pb-2 flex justify-between items-center">
                Saisie du Bug
                <select id="langage" class="text-xs bg-indigo-50 text-indigo-700 border-none rounded px-2 py-1 outline-none font-bold">
                    <option value="Python">Python</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="PHP">PHP</option>
                    <option value="Java">Java</option>
                    <option value="C++">C++</option>
                    <option value="Autre">Autre</option>
                </select>
            </h2>
            
            <div class="flex flex-col gap-2">
                <label for="code" class="text-sm font-medium text-slate-600">Ton code :</label>
                <textarea id="code" rows="8" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg font-mono text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Colle ton code ici..."></textarea>
            </div>

            <div class="flex flex-col gap-2">
                <label for="erreur" class="text-sm font-medium text-slate-600">L'erreur console :</label>
                <textarea id="erreur" rows="3" class="w-full p-3 bg-red-50 border border-red-100 rounded-lg font-mono text-sm focus:ring-2 focus:ring-red-400 outline-none text-red-800" placeholder="Colle le message d'erreur..."></textarea>
            </div>

            <div class="flex gap-2">
                <button id="btn-analyze" class="flex-grow bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg transition-all flex justify-center items-center gap-2 shadow-md">
                    <span>Analyser le bug</span>
                    <svg id="spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
                <button id="btn-reset" class="bg-slate-100 hover:bg-slate-200 text-slate-500 p-3 rounded-lg border border-slate-200 transition-colors">🔄</button>
            </div>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col min-h-[500px]">
            <h2 class="text-lg font-semibold text-slate-700 border-b pb-2 mb-4 italic">Réponse du Mentor Socratique</h2>
            
            <div id="result-container" class="flex-grow overflow-y-auto hidden flex flex-col gap-6">
                <div class="bg-indigo-50 border-l-4 border-indigo-500 p-4 rounded-r-lg fade-in">
                    <p id="res-explication" class="text-indigo-900 text-sm leading-relaxed"></p>
                </div>

                <div id="res-hypotheses" class="flex flex-col gap-4 fade-in" style="animation-delay: 0.2s;"></div>

                <div id="res-encouragement" class="mt-auto bg-emerald-50 p-4 rounded-lg border border-emerald-200 text-center text-sm text-emerald-800 font-medium italic fade-in" style="animation-delay: 0.4s;"></div>
            </div>

            <div id="empty-state" class="flex-grow flex flex-col items-center justify-center text-slate-400 gap-4 text-center p-8">
                <p class="text-sm">Prêt à analyser tes bugs, peu importe le langage !</p>
                <p id="error-display" class="text-xs text-red-500 font-mono mt-4 hidden"></p>
            </div>
        </section>
    </main>

    <script>
        let conversationHistory = "";

        const btnAnalyze = document.getElementById('btn-analyze');
        const spinner = document.getElementById('spinner');
        const resultContainer = document.getElementById('result-container');
        const emptyState = document.getElementById('empty-state');
        const errorDisplay = document.getElementById('error-display');

        document.getElementById('btn-reset').onclick = () => {
            conversationHistory = "";
            document.getElementById('code').value = "";
            document.getElementById('erreur').value = "";
            resultContainer.classList.add('hidden');
            emptyState.classList.remove('hidden');
            errorDisplay.classList.add('hidden');
        };

        btnAnalyze.onclick = async () => {
            const code = document.getElementById('code').value.trim();
            const erreur = document.getElementById('erreur').value.trim();
            const langage = document.getElementById('langage').value;
            
            if (!code || !erreur) return alert("Remplis tous les champs !");

            btnAnalyze.disabled = true;
            spinner.classList.remove('hidden');
            errorDisplay.classList.add('hidden');

            try {
                const response = await fetch('http://127.0.0.1:8000/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ langage, code, erreur, historique: conversationHistory })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || "Erreur inconnue");
                }

                conversationHistory += `\nÉtudiant: ${erreur}\nMentor: ${data.explication_erreur}`;

                document.getElementById('res-explication').innerText = data.explication_erreur;
                document.getElementById('res-encouragement').innerText = data.encouragement;
                
                const container = document.getElementById('res-hypotheses');
                container.innerHTML = ''; 

                data.hypotheses.forEach((hyp, i) => {
                    container.innerHTML += `
                        <div class="bg-white border border-slate-200 rounded-lg p-4 shadow-sm">
                            <h4 class="font-bold text-slate-800 text-sm mb-1">${i+1}. ${hyp.titre}</h4>
                            <p class="text-slate-600 text-xs mb-3">${hyp.explication}</p>
                            <div class="bg-slate-900 text-indigo-300 text-[10px] p-3 rounded font-mono">
                                <b class="text-white">ACTION :</b> ${hyp.test_suggere}
                            </div>
                        </div>
                    `;
                });

                emptyState.classList.add('hidden');
                resultContainer.classList.remove('hidden');

            } catch (e) {
                console.error(e);
                errorDisplay.innerText = "Détail : " + e.message;
                errorDisplay.classList.remove('hidden');
                alert("Erreur lors de l'analyse.");
            } finally {
                btnAnalyze.disabled = false;
                spinner.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
